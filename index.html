// ── SETUP SCREEN ─────────────────────────────────────────────
function SetupScreen({ onComplete }) {

 startWeight: "", goalWeight: "", heightFt: "", heightIn: "", age: "", sex: "male", wkTime: "morning"
 });
 const [err, setErr] = React.useState("");

 const upd = (k, v) => setForm(f => ({...f, [k]: v}));

 function validateAndNext() {
 setErr("");
 if (step === 0) {
 const sw = parseFloat(form.startWeight), gw = parseFloat(form.goalWeight);
 if (!sw || sw < 80 || sw > 500) return setErr("Enter a valid current weight (80–500 lbs)");
 if (!gw || gw < 80 || gw > 500) return setErr("Enter a valid goal weight (80–500 lbs)");
 if (gw >= sw) return setErr("Goal weight should be less than current weight");
 }
 if (step === 1) {
 const ft = parseInt(form.heightFt), inches = parseInt(form.heightIn||0);
 const age = parseInt(form.age);
 if (!ft || ft < 4 || ft > 7) return setErr("Enter a valid height (4–7 ft)");
 if (isNaN(inches) || inches < 0 || inches > 11) return setErr("Inches should be 0–11");
 if (!age || age < 16 || age > 80) return setErr("Enter a valid age (16–80)");
 }
 if (step < 2) { setStep(s => s+1); return; }
 // Complete
 const ft = parseInt(form.heightFt), inches = parseInt(form.heightIn||0);
 const heightCm = Math.round((ft * 30.48) + (inches * 2.54));
 onComplete({
 startWeight: parseFloat(form.startWeight),
 goalWeight: parseFloat(form.goalWeight),
 heightCm,
 age: parseInt(form.age),
 sex: form.sex,
 wkTime: form.wkTime,
 });
 }

// ── PERSISTENT STORAGE — localStorage ───────────────────────
// Works in any real browser. Data stays on your device only.

function storageGet(key) {
 try {
 const v = localStorage.getItem(key);
 return v !== null ? JSON.parse(v) : null;
 } catch { return null; }
}

function storageSet(key, val) {
 try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function usePersist(key, init) {
 const [val, setVal] = React.useState(() => {
 const stored = storageGet(key);
 return stored !== null ? stored : init;
 });

 const set = React.useCallback((newVal) => {
 setVal(prev => {
 const resolved = typeof newVal === "function" ? newVal(prev) : newVal;
 storageSet(key, resolved);
 return resolved;
 });
 }, [key]);

 return [val, set, true];
}

// ── STATS — all user-specific values come from localStorage ──
const STEP_GOAL = 8000;

function calcBMR(w, heightCm, age, sex) {
 const kg = w * 0.453592;
 const offset = (sex === "female") ? -161 : 5;
 return Math.round((10*kg) + (6.25*heightCm) - (5*age) + offset);
}
function calcTDEE(w, h, a, sex) { return Math.round(calcBMR(w,h,a,sex)*1.375); }
function calcTrainingDayCals(w,h,a,sex){ return Math.round(calcTDEE(w,h,a,sex)*0.92); }
function calcRestDayCals(w,h,a,sex) { return Math.round(calcTDEE(w,h,a,sex)*0.72); }
function calcMilestones(start, goal) {
 const milestones = [];
 let m = Math.ceil(goal/5)*5;
 while (m <= start) { milestones.unshift(m); m += 15; }
 if (!milestones.includes(goal)) milestones.unshift(goal);
 return [...new Set(milestones)].sort((a,b)=>b-a);
}

function getPlan(id){ return PLANS.find(p=>p.id===id)||PLANS[0]; }
function getWeight(sw, inc, wk, exBests, exId) {
 const programWeight = sw + inc * Math.floor(wk/2);
 const bestWeight = exBests?.[exId]?.weight ?? 0;
 // Use whichever is higher: program progression or best logged performance
 return Math.max(programWeight, bestWeight);
}
function getWarmup(w){ return w>15?Math.round((w*0.5)/2.5)*2.5:0; }

 const [weekNum, setWeekNum, wkLoaded] = usePersist("lg_week", 0);

 const [userProfile, setUserProfile, profLoaded] = usePersist("lg_profile", null);
 const [exBests, setExBests] = usePersist("lg_exbests", {});

 const loaded = wkLoaded && logsLoaded && stLoaded && cwLoaded && wtLoaded && profLoaded && planLoaded;
 const setupDone = userProfile !== null;

 // Active plan + helpers
 const activePlan = getPlan(activePlanId);
 const allExes = activePlan.days.flatMap(d=>d.exercises);

 // stepLogs: { "date": {regular:N, ruck:N, ruckMiles:N|null} } or legacy number
 function getStepEntry(dt){ const v=stepLogs[dt]; if(!v) return {regular:0,ruck:0,ruckMiles:null}; if(typeof v==="number") return {regular:v,ruck:0,ruckMiles:null}; return {regular:v.regular||0,ruck:v.ruck||0,ruckMiles:v.ruckMiles||null}; }
 function getTotalSteps(dt){ const e=getStepEntry(dt); return e.regular+e.ruck; }

 // Derived from profile
 const userStartWeight = userProfile?.startWeight ?? 200;
 const userGoalWeight = userProfile?.goalWeight ?? 160;
 const userHeightCm = userProfile?.heightCm ?? 170;
 const userAge = userProfile?.age ?? 30;
 const userWeightLbs = curWeight ?? userStartWeight;

 // Session-only state
 const [activeWorkout, setActiveWorkout] = React.useState(null);
 const [completedSets, setCompletedSets] = React.useState({});
 const [setData, setSetData] = React.useState({});
 const [logInput, setLogInput] = React.useState({});
 const [expandedSet, setExpandedSet] = React.useState(null);
 const [expandedEx, setExpandedEx] = React.useState(null);
 const [showAltPicker, setShowAltPicker] = React.useState(null);
 const [logDate, setLogDate] = React.useState(null);
 const [logDay, setLogDay] = React.useState(null);
 const [showLogEditor, setShowLogEditor] = React.useState(false);
 const [calOffset, setCalOffset] = React.useState(0);
 const [rInp, setRInp] = React.useState("");
 const [rkInp, setRkInp] = React.useState("");
 const [miInp, setMiInp] = React.useState("");
 const [showCardio, setShowCardio] = React.useState(false);
 const [expandedTip, setExpandedTip] = React.useState(null);
 const [expandedMeal, setExpandedMeal] = React.useState(null);
 const [weightInput, setWeightInput] = React.useState("");
 const [saveStatus, setSaveStatus] = React.useState("");
 const [showBackup, setShowBackup] = React.useState(false);
 const [importText, setImportText] = React.useState("");
 const [importStatus, setImportStatus] = React.useState("");
 const [viewingLog, setViewingLog] = React.useState(null);
 const [showPlanPicker, setShowPlanPicker] = React.useState(false);

 const today = new Date().toISOString().split("T")[0];
 const dayObj = activePlan.days.find(d=>d.id===activeWorkout);
 const stepsToday = getTotalSteps(today);
 const stepEntryToday = getStepEntry(today);
 const lostSoFar = userStartWeight - userWeightLbs;
 const remaining = userWeightLbs - userGoalWeight;
 const tdee = calcTDEE(userWeightLbs,userHeightCm,userAge,userProfile?.sex);
 const proteinTarget = userGoalWeight;
 const trainCals = calcTrainingDayCals(userWeightLbs,userHeightCm,userAge,userProfile?.sex);
 const restCals = calcRestDayCals(userWeightLbs,userHeightCm,userAge,userProfile?.sex);
 const avgDailyCals = Math.round((trainCals*3+restCals*4)/7);
 const weightMilestones = calcMilestones(userStartWeight, userGoalWeight);
 const nextMilestone = weightMilestones.find(m=>m<userWeightLbs)||userGoalWeight;
 const lbsToMilestone = userWeightLbs - nextMilestone;

 const last7 = Array.from({length:7},(_,i)=>{
 const d=new Date(); d.setDate(d.getDate()-(6-i));
 const k=d.toISOString().split("T")[0];
 const se=getStepEntry(k);
 return {date:k,steps:getTotalSteps(k),regular:se.regular,ruck:se.ruck,ruckMiles:se.ruckMiles,label:["Su","Mo","Tu","We","Th","Fr","Sa"][d.getDay()]};
 });
 const activeDays = last7.filter(d=>d.steps>0);
 const avgSteps = activeDays.length?Math.round(activeDays.reduce((a,b)=>a+b.steps,0)/activeDays.length):0;

 function getActiveEx(ex){
 const altId=exAlts[ex.id];
 if(!altId||altId==="default") return ex;
 const alt=(ex.alternatives||[]).find(a=>a.id===altId);
 return alt?{...ex,name:alt.name,startWeight:alt.startWeight,increment:alt.increment,warmupPct:alt.warmupPct,cue:alt.cue,isAlt:true}:ex;
 }

 function startWorkout(id){
 setActiveWorkout(id); setCompletedSets({}); setSetData({}); setLogInput({});
 setExpandedSet(null); setExpandedEx(null); setShowAltPicker(null);
 setLogDate(today); setLogDay(id); setShowLogEditor(false); setScreen("workout");
 }

 function openSetLog(exId,i,defW){
 const k=`${exId}_${i}`;
 if(completedSets[k]){setCompletedSets(p=>({...p,[k]:false}));setExpandedSet(null);return;}
 setExpandedSet(expandedSet===k?null:k);
 if(!logInput[k]) setLogInput(p=>({...p,[k]:{weight:String(defW||""),reps:""}}));
 }

 function confirmSet(exId,i){
 const k=`${exId}_${i}`;
 const inp=logInput[k]||{};
 const w=parseFloat(inp.weight),r=parseInt(inp.reps);
 setSetData(p=>({...p,[k]:{weight:!isNaN(w)?w:null,reps:!isNaN(r)?r:null}}));
 setCompletedSets(p=>({...p,[k]:true}));

 // exId is everything except the last segment (set index)

 const r = parseInt(s.reps)||0;
 if (w > 0 && r > 0) {

 await setExBests(newBests);

 <div style={{background:"#111",borderRadius:12,padding:"12px 14px",border:"1px solid #222",marginBottom:16}}>

 <button onClick={()=>{const nl={...logs};delete nl[date];setLogs(nl);}} style={{flex:1,padding:"6px 0",borderRadius:8,background:"#1a1a00",color:"#885500",fontSize:11,border:"1px solid #3a2a00"}}>🗑 Delete</button>

 );

 <div style={{fontSize:9,letterSpacing:3,color:"#8a7c6e",textTransform:"uppercase",marginBottom:10,marginTop:16}}>All-time</div>

 {viewingLog&&(()=>{

 byEx[exId][setIdx] = v;
 });
 }
 return (
 <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:100,overflowY:"auto",WebkitOverflowScrolling:"touch"}} onClick={()=>setViewingLog(null)}>

 <button onClick={()=>{const nl={...logs};delete nl[viewingLog];setLogs(nl);setViewingLog(null);}}
