// ── SETUP SCREEN ─────────────────────────────────────────────
function SetupScreen({ onComplete }) {
  const [step, setStep] = React.useState(0);
  const [form, setForm] = React.useState({
    startWeight: "", goalWeight: "", heightFt: "", heightIn: "", age: "", sex: "male", wkTime: "morning"
  });
  const [err, setErr] = React.useState("");

  const upd = (k, v) => setForm(f => ({...f, [k]: v}));

  function validateAndNext() {
    setErr("");
    if (step === 0) {
      const sw = parseFloat(form.startWeight), gw = parseFloat(form.goalWeight);
      if (!sw || sw < 80 || sw > 500) return setErr("Enter a valid current weight (80–500 lbs)");
      if (!gw || gw < 80 || gw > 500) return setErr("Enter a valid goal weight (80–500 lbs)");
      if (gw >= sw) return setErr("Goal weight should be less than current weight");
    }
    if (step === 1) {
      const ft = parseInt(form.heightFt), inches = parseInt(form.heightIn||0);
      const age = parseInt(form.age);
      if (!ft || ft < 4 || ft > 7) return setErr("Enter a valid height (4–7 ft)");
      if (isNaN(inches) || inches < 0 || inches > 11) return setErr("Inches should be 0–11");
      if (!age || age < 16 || age > 80) return setErr("Enter a valid age (16–80)");
    }
    if (step < 2) { setStep(s => s+1); return; }
    // Complete
    const ft = parseInt(form.heightFt), inches = parseInt(form.heightIn||0);
    const heightCm = Math.round((ft * 30.48) + (inches * 2.54));
    onComplete({
      startWeight: parseFloat(form.startWeight),
      goalWeight:  parseFloat(form.goalWeight),
      heightCm,
      age:         parseInt(form.age),
      sex:         form.sex,
      wkTime:      form.wkTime,
    });
  }

  const S2 = {
    page: {minHeight:"100vh",background:"#0a0a0a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 24px",fontFamily:"-apple-system,BlinkMacSystemFont,sans-serif"},
    card: {width:"100%",maxWidth:380,background:"#111",borderRadius:20,padding:28,border:"1px solid #1e1e1e"},
    label: {fontSize:11,letterSpacing:2,color:"#8a7c6e",textTransform:"uppercase",marginBottom:8,display:"block",fontWeight:700},
    input: {width:"100%",background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:12,padding:"14px 16px",color:"#f0ede8",fontSize:17,fontFamily:"inherit",marginBottom:16,display:"block"},
    btn: {width:"100%",padding:16,borderRadius:14,background:"#ff6a00",color:"#0a0a0a",fontWeight:800,fontSize:16,letterSpacing:1},
    err: {color:"#cc4444",fontSize:13,marginBottom:12,textAlign:"center"},
    step: {fontSize:10,color:"#555",letterSpacing:2,textTransform:"uppercase",marginBottom:6,textAlign:"center"},
    title: {fontSize:28,fontWeight:800,color:"#f0ede8",marginBottom:4},
    sub: {fontSize:13,color:"#8a7c6e",marginBottom:24,lineHeight:1.6},
  };

  return (
    <div style={S2.page}>
      <div style={{fontSize:48,marginBottom:16}}>💀</div>
      <div style={{...S2.title,textAlign:"center"}}>Lazy Gains</div>
      <div style={{...S2.sub,textAlign:"center",marginBottom:32}}>Nippard × Huberman · 3 days/week</div>
      <div style={S2.card}>
        <div style={S2.step}>Step {step+1} of 3</div>
        {/* Progress bar */}
        <div style={{height:3,background:"#1a1a1a",borderRadius:3,marginBottom:24}}>
          <div style={{height:3,background:"#ff6a00",borderRadius:3,width:`${((step+1)/3)*100}%`,transition:"width 0.3s"}}/>
        </div>

        {step === 0 && (<>
          <div style={{...S2.title,fontSize:20,marginBottom:6}}>Your weights</div>
          <div style={{...S2.sub,fontSize:12}}>This stays on your device only — never uploaded anywhere.</div>
          <label style={S2.label}>Current weight (lbs)</label>
          <input style={S2.input} type="number" placeholder="e.g. 210" value={form.startWeight}
            onChange={e=>upd("startWeight",e.target.value)} inputMode="decimal"/>
          <label style={S2.label}>Goal weight (lbs)</label>
          <input style={S2.input} type="number" placeholder="e.g. 175" value={form.goalWeight}
            onChange={e=>upd("goalWeight",e.target.value)} inputMode="decimal"/>
        </>)}

        {step === 1 && (<>
          <div style={{...S2.title,fontSize:20,marginBottom:6}}>About you</div>
          <div style={{...S2.sub,fontSize:12}}>Used to calculate your calorie targets. Stays on your device.</div>
          <label style={S2.label}>Height</label>
          <div style={{display:"flex",gap:10,marginBottom:16}}>
            <input style={{...S2.input,marginBottom:0,flex:1}} type="number" placeholder="5 ft"
              value={form.heightFt} onChange={e=>upd("heightFt",e.target.value)} inputMode="numeric"/>
            <input style={{...S2.input,marginBottom:0,flex:1}} type="number" placeholder="9 in"
              value={form.heightIn} onChange={e=>upd("heightIn",e.target.value)} inputMode="numeric"/>
          </div>
          <label style={S2.label}>Age</label>
          <input style={S2.input} type="number" placeholder="e.g. 32" value={form.age}
            onChange={e=>upd("age",e.target.value)} inputMode="numeric"/>
          <label style={S2.label}>Sex (for calorie formula)</label>
          <div style={{display:"flex",gap:10,marginBottom:16}}>
            {["male","female"].map(s => (
              <button key={s} onClick={()=>upd("sex",s)}
                style={{flex:1,padding:12,borderRadius:10,background:form.sex===s?"#ff6a00":"#1a1a1a",
                  color:form.sex===s?"#0a0a0a":"#8a7c6e",fontWeight:700,fontSize:13,border:"1px solid #2a2a2a",
                  textTransform:"capitalize"}}>
                {s}
              </button>
            ))}
          </div>
        </>)}

        {step === 2 && (<>
          <div style={{...S2.title,fontSize:20,marginBottom:6}}>Workout timing</div>
          <div style={{...S2.sub,fontSize:12}}>When do you usually train? Affects your meal schedule.</div>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
            {[["morning","☀️ Morning (7–8am)","Pre-workout breakfast, post-workout lunch"],
              ["evening","🌙 Evening (5–6pm)","Bigger lunch, pre/post-workout dinner"]].map(([val,label,desc])=>(
              <button key={val} onClick={()=>upd("wkTime",val||"morning")}
                style={{padding:"14px 16px",borderRadius:12,background:form.wkTime===val?"#1a0d00":"#1a1a1a",
                  color:"#f0ede8",border:form.wkTime===val?"1px solid #ff6a00":"1px solid #2a2a2a",
                  textAlign:"left"}}>
                <div style={{fontWeight:700,fontSize:14,color:form.wkTime===val?"#ff6a00":"#f0ede8"}}>{label}</div>
                <div style={{fontSize:11,color:"#8a7c6e",marginTop:3}}>{desc}</div>
              </button>
            ))}
          </div>
        </>)}

        {err && <div style={S2.err}>{err}</div>}
        <button style={S2.btn} onClick={validateAndNext}>
          {step < 2 ? "Continue →" : "Let's Go 💀"}
        </button>
        {step > 0 && (
          <button onClick={()=>setStep(s=>s-1)}
            style={{width:"100%",padding:12,background:"none",color:"#555",fontSize:13,marginTop:8}}>
            ← Back
          </button>
        )}
      </div>
      <div style={{fontSize:10,color:"#333",marginTop:20,textAlign:"center",lineHeight:1.8}}>
        All data saved locally on your device.<br/>Nothing is sent to any server.
      </div>
    </div>
  );
}


// ── PERSISTENT STORAGE — localStorage ───────────────────────
// Works in any real browser. Data stays on your device only.

function storageGet(key) {
  try {
    const v = localStorage.getItem(key);
    return v !== null ? JSON.parse(v) : null;
  } catch { return null; }
}

function storageSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function usePersist(key, init) {
  const [val, setVal] = React.useState(() => {
    const stored = storageGet(key);
    return stored !== null ? stored : init;
  });
  const [loaded, setLoaded] = React.useState(true); // instant — no async needed

  const set = React.useCallback((newVal) => {
    const resolved = typeof newVal === "function" ? newVal(val) : newVal;
    setVal(resolved);
    storageSet(key, resolved);
  }, [key, val]);

  return [val, set, loaded];
}

// ── STATS — all user-specific values come from localStorage ──
const STEP_GOAL = 8000;

function calcBMR(w, heightCm, age, sex) {
  const kg = w * 0.453592;
  const offset = (sex === "female") ? -161 : 5;
  return Math.round((10*kg) + (6.25*heightCm) - (5*age) + offset);
}
function calcTDEE(w, h, a, sex)    { return Math.round(calcBMR(w,h,a,sex)*1.375); }
function calcTrainingDayCals(w,h,a,sex){ return Math.round(calcTDEE(w,h,a,sex)*0.92); }
function calcRestDayCals(w,h,a,sex)    { return Math.round(calcTDEE(w,h,a,sex)*0.72); }
function calcMilestones(start, goal) {
  const milestones = [];
  let m = Math.ceil(goal/5)*5;
  while (m <= start) { milestones.unshift(m); m += 15; }
  if (!milestones.includes(goal)) milestones.unshift(goal);
  return [...new Set(milestones)].sort((a,b)=>b-a);
}

const WEEK_SCHEDULE = ["A","rest","B","rest","C","cardio","rest"];
function getWeight(sw, inc, wk, exBests, exId) {
  const programWeight = sw + inc * Math.floor(wk/2);
  const bestWeight = exBests?.[exId]?.weight ?? 0;
  // Use whichever is higher: program progression or best logged performance
  return Math.max(programWeight, bestWeight);
}
function getWarmup(w){ return w>15?Math.round((w*0.5)/2.5)*2.5:0; }

  {icon:"⚖️",who:"Nippard",title:"Weigh In Smart",body:"Weigh every morning after bathroom, before eating. Take the weekly average — daily swings of 2–5 lbs are normal. The trend over weeks is what matters, not today's number."},

// ── APP ──────────────────────────────────────────────────────
function App() {
  const [screen, setScreen]   = React.useState("home");
  const [activeTab, setActiveTab] = React.useState("training");

  // Persisted state
  const [weekNum,     setWeekNum,     wkLoaded]  = usePersist("lg_week", 0);
  const [logs,        setLogs,        logsLoaded] = usePersist("lg_logs", {});
  const [stepLogs,    setStepLogs,    stLoaded]   = usePersist("lg_steps", {});
  const [curWeight,   setCurWeight,   cwLoaded]   = usePersist("lg_curweight", null);
  const [wkTime,      setWkTime,      wtLoaded]   = usePersist("lg_wktime", "morning");
  const [exAlts,      setExAlts]                  = usePersist("lg_exalts", {});
  // User profile — entered on first run
  const [userProfile, setUserProfile, profLoaded] = usePersist("lg_profile", null);
  // Per-exercise best performance for adaptive progression
  const [exBests,     setExBests]                 = usePersist("lg_exbests", {});

  const loaded = wkLoaded && logsLoaded && stLoaded && cwLoaded && wtLoaded && profLoaded;
  const setupDone = userProfile !== null;

  // Derived from profile
  const userStartWeight  = userProfile?.startWeight  ?? 200;
  const userGoalWeight   = userProfile?.goalWeight   ?? 160;
  const userHeightCm     = userProfile?.heightCm     ?? 170;
  const userAge          = userProfile?.age          ?? 30;
  const userWeightLbs    = curWeight ?? userStartWeight;

  // Session-only state
  const [activeWorkout, setActiveWorkout] = React.useState(null);
  const [completedSets, setCompletedSets] = React.useState({});
  const [setData,       setSetData]       = React.useState({});
  const [logInput,      setLogInput]      = React.useState({});
  const [expandedSet,   setExpandedSet]   = React.useState(null);
  const [expandedEx,    setExpandedEx]    = React.useState(null);
  const [showAltPicker, setShowAltPicker] = React.useState(null);
  const [logDate,       setLogDate]       = React.useState(null);
  const [logDay,        setLogDay]        = React.useState(null);
  const [showLogEditor, setShowLogEditor] = React.useState(false);
  const [calOffset,     setCalOffset]     = React.useState(0);
  const [todaySteps,    setTodaySteps]    = React.useState("");
  const [showCardio,    setShowCardio]    = React.useState(false);
  const [expandedTip,   setExpandedTip]   = React.useState(null);
  const [expandedMeal,  setExpandedMeal]  = React.useState(null);
  const [weightInput,   setWeightInput]   = React.useState("");
  const [saveStatus,    setSaveStatus]    = React.useState("");
  const [showBackup,    setShowBackup]    = React.useState(false);
  const [importText,    setImportText]    = React.useState("");
  const [importStatus,  setImportStatus]  = React.useState("");

  const today = new Date().toISOString().split("T")[0];
  const dayObj = PROGRAM.days.find(d=>d.id===activeWorkout);
  const stepsToday = stepLogs[today]||0;
  const lostSoFar = userStartWeight - userWeightLbs;
  const remaining = userWeightLbs - userGoalWeight;
  const tdee = calcTDEE(userWeightLbs,userHeightCm,userAge,userProfile?.sex);
  const proteinTarget = userGoalWeight;
  const trainCals = calcTrainingDayCals(userWeightLbs,userHeightCm,userAge,userProfile?.sex);
  const restCals  = calcRestDayCals(userWeightLbs,userHeightCm,userAge,userProfile?.sex);
  const avgDailyCals = Math.round((trainCals*3+restCals*4)/7);
  const weightMilestones = calcMilestones(userStartWeight, userGoalWeight);
  const nextMilestone = weightMilestones.find(m=>m<userWeightLbs)||userGoalWeight;
  const lbsToMilestone = userWeightLbs - nextMilestone;

  const last7 = Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(6-i));
    const k=d.toISOString().split("T")[0];
    return {date:k,steps:stepLogs[k]||0,label:["Su","Mo","Tu","We","Th","Fr","Sa"][d.getDay()]};
  });
  const activeDays = last7.filter(d=>d.steps>0);
  const avgSteps = activeDays.length?Math.round(activeDays.reduce((a,b)=>a+b.steps,0)/activeDays.length):0;

  function getActiveEx(ex){
    const altId=exAlts[ex.id];
    if(!altId||altId==="default") return ex;
    const alt=(ex.alternatives||[]).find(a=>a.id===altId);
    return alt?{...ex,name:alt.name,startWeight:alt.startWeight,increment:alt.increment,warmupPct:alt.warmupPct,cue:alt.cue,isAlt:true}:ex;
  }

  function startWorkout(id){
    setActiveWorkout(id); setCompletedSets({}); setSetData({}); setLogInput({});
    setExpandedSet(null); setExpandedEx(null); setShowAltPicker(null);
    setLogDate(today); setLogDay(id); setShowLogEditor(false); setScreen("workout");
  }

  function openSetLog(exId,i,defW){
    const k=`${exId}_${i}`;
    if(completedSets[k]){setCompletedSets(p=>({...p,[k]:false}));setExpandedSet(null);return;}
    setExpandedSet(expandedSet===k?null:k);
    if(!logInput[k]) setLogInput(p=>({...p,[k]:{weight:String(defW||""),reps:""}}));
  }

  function confirmSet(exId,i){
    const k=`${exId}_${i}`;
    const inp=logInput[k]||{};
    const w=parseFloat(inp.weight),r=parseInt(inp.reps);
    setSetData(p=>({...p,[k]:{weight:!isNaN(w)?w:null,reps:!isNaN(r)?r:null}}));
    setCompletedSets(p=>({...p,[k]:true}));
    setExpandedSet(null);
  }

  function skipLog(exId,i){ const k=`${exId}_${i}`; setCompletedSets(p=>({...p,[k]:true})); setExpandedSet(null); }

  async function finishWorkout(){
    const saveDate=logDate||today, saveDay=logDay||activeWorkout;
    const nl={...logs,[saveDate]:{day:saveDay,week:weekNum,sets:setData,loggedAt:today}};
    await setLogs(nl);
    // Record best performance per exercise for adaptive progression
    const newBests = {...exBests};
    Object.entries(setData).forEach(([exId, sets]) => {
      sets.forEach(s => {
        const w = parseFloat(s.weight)||0;
        const r = parseInt(s.reps)||0;
        if (w > 0 && r > 0) {
          const prev = newBests[exId];
          // Update best if this weight is higher, or same weight with more reps
          if (!prev || w > prev.weight || (w === prev.weight && r > prev.reps)) {
            newBests[exId] = { weight: w, reps: r, date: today };
          }
        }
      });
    });
    await setExBests(newBests);
    setSaveStatus("Saved ✓"); setTimeout(()=>setSaveStatus(""),2000);
    setScreen("done");
  }

  async function logSteps(){
    const n=parseInt(todaySteps);
    if(!isNaN(n)&&n>=0){ await setStepLogs({...stepLogs,[today]:n}); setTodaySteps(""); }
  }

  async function updateWeight(){
    const n=parseFloat(weightInput);
    if(!isNaN(n)&&n>50&&n<600){ await setCurWeight(n); setWeightInput(""); }
  }

  function exportData() {
    const payload = {
      exportedAt: new Date().toISOString(),
      version: 1,
      data: { lg_week: weekNum, lg_logs: logs, lg_steps: stepLogs,
              lg_curweight: curWeight, lg_wktime: wkTime, lg_exalts: exAlts }
    };
    const json = JSON.stringify(payload, null, 2);
    const blob = new Blob([json], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `lazy-gains-backup-${new Date().toISOString().split("T")[0]}.json`;
    a.click(); URL.revokeObjectURL(url);
  }

  async function importData() {
    try {
      const parsed = JSON.parse(importText);
      const d = parsed.data || parsed;
      if (d.lg_week !== undefined) await setWeekNum(d.lg_week);
      if (d.lg_logs) await setLogs(d.lg_logs);
      if (d.lg_steps) await setStepLogs(d.lg_steps);
      if (d.lg_curweight) await setCurWeight(d.lg_curweight);
      if (d.lg_wktime) await setWkTime(d.lg_wktime);
      if (d.lg_exalts) await setExAlts(d.lg_exalts);
      setImportStatus("✅ Restored successfully!");
      setImportText("");
      setTimeout(() => { setImportStatus(""); setShowBackup(false); }, 2500);
    } catch(e) {
      setImportStatus("❌ Invalid backup file. Paste the full JSON.");
    }
  }

  const schedule = MEAL_SCHEDULES[wkTime];

  const S = {
    page:{minHeight:"100vh",background:"#0a0a0a",color:"#f0ede8",fontFamily:"Georgia,serif",maxWidth:430,margin:"0 auto",paddingBottom:screen==="home"?80:0},
  };

  // Loading screen
  if(!loaded) return (
    <div style={{...S.page,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:40}}>💀</div>
      <div style={{fontSize:14,color:"#8a7c6e"}}>Loading...</div>
    </div>
  );

  // First-run setup
  if(!setupDone) return <SetupScreen onComplete={(profile) => {
    setUserProfile(profile);
    setCurWeight(profile.startWeight);
    if(profile.wkTime) setWkTime(profile.wkTime);
  }}/>;

  return (
    <div style={S.page}>
      <style>{`*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}button{cursor:pointer;border:none;font-family:inherit}input{-webkit-appearance:none}.si{animation:si 0.2s ease}@keyframes si{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}.cb{transition:all 0.15s}.cb:active{transform:scale(0.93)}input:focus{outline:1px solid #ff6a00!important}::-webkit-scrollbar{display:none}`}</style>

      {/* ══ WORKOUT SCREEN ══════════════════════════════════════ */}
      {screen==="workout"&&dayObj&&(
        <div className="si">
          <div style={{padding:"24px 24px 14px",background:"#111",borderBottom:"1px solid #222"}}>
            <button onClick={()=>setScreen("home")} style={{background:"none",color:"#8a7c6e",fontSize:14,marginBottom:10,padding:0}}>← Back</button>
            <div style={{fontSize:10,letterSpacing:3,color:"#8a7c6e",textTransform:"uppercase"}}>Week {weekNum+1} · {dayObj.subtitle}</div>
            <div style={{fontSize:26,fontWeight:700,marginTop:4}}>{dayObj.emoji} {dayObj.name}</div>
            <div style={{marginTop:10,background:"#1a0d00",borderRadius:10,padding:"10px 14px",border:"1px solid #2a1200"}}>
              <div style={{fontSize:9,letterSpacing:2,color:"#c06820",textTransform:"uppercase",marginBottom:4}}>Nippard Says</div>
              <div style={{fontSize:12,color:"#e08840",lineHeight:1.6}}>{dayObj.nippardNote}</div>
            </div>
          </div>
          <div style={{padding:"16px 24px"}}>
            {dayObj.exercises.map(ex=>{
              const activeEx=getActiveEx(ex);
              const ww=getWeight(activeEx.startWeight,activeEx.increment,weekNum,exBests,activeEx.id);
              const wu=activeEx.warmupPct>0?getWarmup(ww):0;
              const done=Array.from({length:ex.sets},(_,i)=>completedSets[`${ex.id}_${i}`]).every(Boolean);
              const open=expandedEx===ex.id;
              const pickerOpen=showAltPicker===ex.id;
              const isAlt=!!(exAlts[ex.id]&&exAlts[ex.id]!=="default");
              return (
                <div key={ex.id} style={{background:done?"#0d1a0d":"#111",border:`1px solid ${done?"#2a4a2a":"#222"}`,borderRadius:16,padding:18,marginBottom:14,transition:"all 0.3s"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:15}}>{activeEx.name}</div>
                      <div style={{fontSize:11,color:"#8a7c6e",marginTop:2}}>{ex.sets} sets × {ex.repsLow}–{ex.repsHigh} reps</div>
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      {done&&<span style={{color:"#4a8a4a",fontSize:18}}>✓</span>}
                      <button onClick={()=>setExpandedEx(open?null:ex.id)} style={{background:"#1a1a1a",color:"#8a7c6e",fontSize:10,padding:"4px 8px",borderRadius:20,border:"1px solid #2a2a2a"}}>{open?"▲":"cue"}</button>
                    </div>
                  </div>
                  <div style={{marginBottom:10}}>
                    <button onClick={()=>setShowAltPicker(pickerOpen?null:ex.id)}
                      style={{background:isAlt?"#1a0d00":"#141414",border:`1px solid ${isAlt?"#ff6a00":"#2a2a2a"}`,borderRadius:8,padding:"5px 10px",fontSize:10,color:isAlt?"#ff6a00":"#555",display:"flex",alignItems:"center",gap:6}}>
                      <span>🔄</span><span>{isAlt?`Alt: ${activeEx.name}`:"Switch exercise"}</span><span style={{color:"#444"}}>{pickerOpen?"▲":"▼"}</span>
                    </button>
                  </div>
                  {pickerOpen&&(
                    <div style={{background:"#0a0a0a",borderRadius:12,padding:12,marginBottom:12,border:"1px solid #2a2a2a"}}>
                      <div style={{fontSize:9,color:"#8a7c6e",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Choose exercise</div>
                      <div onClick={()=>{setExAlts(p=>({...p,[ex.id]:"default"}));setShowAltPicker(null);}}

                      <div key={m} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,opacity:isPast?0.3:1}}>
                        <span style={{fontSize:11,color:isCurrent?"#ff6a00":"#8a7c6e"}}>{m} lbs{isCurrent?" ←":""}</span>
                        <span style={{fontSize:11,color:"#f0ede8"}}>target {Math.round(calcTDEE(m,userHeightCm,userAge,userProfile?.sex)*0.80)} cal</span>
                        <span style={{fontSize:10,color:"#555"}}>TDEE {calcTDEE(m,userHeightCm,userAge,userProfile?.sex)}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
              <div style={{background:"#111",borderRadius:14,padding:16,border:"1px solid #222",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontSize:14,fontWeight:700}}>🍗 Daily Protein</div><div style={{fontSize:11,color:"#8a7c6e",marginTop:2}}>Spread across 3–4 meals</div></div>
                <div style={{fontSize:26,fontWeight:700,color:"#ff6a00"}}>{userGoalWeight}g</div>
              </div>
              <div style={{background:"#111",borderRadius:14,padding:16,border:"1px solid #222",marginBottom:16}}>
                <div style={{fontSize:11,color:"#8a7c6e",marginBottom:10}}>When do you usually train?</div>
                <div style={{display:"flex",gap:8}}>
                  {[["morning","☀️ Morning"],["evening","🌙 Evening"]].map(([id,label])=>(
                    <button key={id} onClick={()=>setWkTime(id)} style={{flex:1,padding:"10px 0",borderRadius:10,background:wkTime===id?"#ff6a00":"#1a1a1a",color:wkTime===id?"#0a0a0a":"#8a7c6e",fontSize:12,fontWeight:wkTime===id?700:400,border:`1px solid ${wkTime===id?"#ff6a00":"#2a2a2a"}`}}>{label}</button>
                  ))}
                </div>
              </div>
              <div style={{fontSize:9,letterSpacing:3,color:"#8a7c6e",textTransform:"uppercase",marginBottom:10}}>Meal Schedule · {schedule.label}</div>
              {schedule.meals.map((meal,i)=>{
                const open=expandedMeal===i;
                return(
                  <div key={i} onClick={()=>setExpandedMeal(open?null:i)} style={{background:open?"#140a00":"#111",borderRadius:16,padding:16,marginBottom:10,border:`1px solid ${open?"#2a1400":"#222"}`,cursor:"pointer",transition:"all 0.2s"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div style={{display:"flex",alignItems:"center",gap:12}}>
                        <div style={{background:"#0a0a0a",borderRadius:8,padding:"6px 10px",minWidth:60,textAlign:"center"}}>
                          <div style={{fontSize:10,fontWeight:700,color:meal.tagColor}}>{meal.tag}</div>
                          <div style={{fontSize:9,color:"#555",marginTop:2}}>{meal.time}</div>
                        </div>
                        <div>
                          <div style={{fontWeight:700,fontSize:14}}>{meal.name}</div>
                          <div style={{fontSize:11,color:"#8a7c6e",marginTop:2}}>~{meal.cals} cal · {meal.protein}g protein</div>
                        </div>
                      </div>
                      <div style={{color:"#555",fontSize:14}}>{open?"∧":"›"}</div>
                    </div>
                    {open&&(
                      <div style={{marginTop:14,borderTop:"1px solid #1e1e1e",paddingTop:14}}>
                        <div style={{fontSize:12,color:"#c07040",lineHeight:1.7,marginBottom:14,fontStyle:"italic"}}>{meal.note}</div>
                        <div style={{fontSize:10,letterSpacing:2,color:"#555",textTransform:"uppercase",marginBottom:8}}>Sample Options (pick one)</div>
                        {meal.options.map((opt,j)=>(
                          <div key={j} style={{background:"#0a0a0a",borderRadius:10,padding:"10px 12px",marginBottom:8}}>
                            <div style={{fontSize:13,color:"#f0ede8",lineHeight:1.5,marginBottom:6}}>{opt.name}</div>
                            <div style={{display:"flex",gap:8}}>
                              <span style={{fontSize:10,color:"#ff6a00",background:"#1a0900",padding:"2px 8px",borderRadius:20}}>{opt.cal} cal</span>
                              <span style={{fontSize:10,color:"#4a8a4a",background:"#0a1a0a",padding:"2px 8px",borderRadius:20}}>{opt.p}g protein</span>
                              <span style={{fontSize:10,color:"#5599cc",background:"#0a0f18",padding:"2px 8px",borderRadius:20}}>{opt.c}g carbs</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
              <div style={{background:"#0d1a0d",borderRadius:14,padding:16,border:"1px solid #1a3a1a",marginTop:4}}>
                <div style={{fontSize:10,letterSpacing:2,color:"#4a8a4a",textTransform:"uppercase",marginBottom:8}}>The Big Picture</div>
                <div style={{fontSize:12,color:"#a0c0a0",lineHeight:1.8}}>Times are guidelines, not rules. <strong style={{color:"#c0e0c0"}}>What matters (in order):</strong> total calories → total protein → meal timing. Nail the first two and you'll make great progress.</div>
              </div>
            </div>
          )}

          {/* ── STEPS TAB ── */}
          {activeTab==="steps"&&(
            <div style={{padding:"20px 24px"}}>
              <div style={{textAlign:"center",marginBottom:22}}>
                <div style={{position:"relative",display:"inline-block",marginBottom:10}}>
                  <svg width="140" height="140" viewBox="0 0 140 140">
                    <circle cx="70" cy="70" r="56" fill="none" stroke="#1a1a1a" strokeWidth="12"/>
                    <circle cx="70" cy="70" r="56" fill="none" stroke={stepsToday>=STEP_GOAL?"#4a8a4a":"#ff6a00"} strokeWidth="12" strokeLinecap="round" strokeDasharray={`${Math.min(stepsToday/STEP_GOAL,1)*351.9} 351.9`} transform="rotate(-90 70 70)" style={{transition:"stroke-dasharray 0.5s"}}/>
                  </svg>
                  <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
                    <div style={{fontSize:20,fontWeight:700,color:stepsToday>=STEP_GOAL?"#4a8a4a":"#ff6a00"}}>{stepsToday.toLocaleString()}</div>
                    <div style={{fontSize:10,color:"#8a7c6e"}}>of {STEP_GOAL.toLocaleString()}</div>
                  </div>
                </div>
                <div style={{fontSize:14,color:stepsToday>=STEP_GOAL?"#4a8a4a":"#8a7c6e"}}>{stepsToday>=STEP_GOAL?"✅ Goal crushed today!":`${(STEP_GOAL-stepsToday).toLocaleString()} steps remaining`}</div>
              </div>
              <div style={{background:"#111",borderRadius:16,padding:18,border:"1px solid #222",marginBottom:18}}>
                <div style={{fontSize:12,color:"#8a7c6e",marginBottom:10}}>Log today's steps</div>
                <div style={{display:"flex",gap:10}}>
                  <input type="number" placeholder="e.g. 8500" value={todaySteps} onChange={e=>setTodaySteps(e.target.value)} onKeyDown={e=>e.key==="Enter"&&logSteps()} style={{flex:1,background:"#1a1a1a",border:"1px solid #333",borderRadius:10,padding:"12px 14px",color:"#f0ede8",fontSize:16,fontFamily:"inherit"}}/>
                  <button onClick={logSteps} style={{background:"#ff6a00",color:"#0a0a0a",padding:"12px 20px",borderRadius:10,fontWeight:700,fontSize:14}}>Save</button>
                </div>
              </div>
              <div style={{background:"#111",borderRadius:16,padding:18,border:"1px solid #222",marginBottom:18}}>
                <div style={{fontSize:9,letterSpacing:3,color:"#8a7c6e",textTransform:"uppercase",marginBottom:14}}>Last 7 Days</div>
                <div style={{display:"flex",gap:5,alignItems:"flex-end",height:80}}>
                  {last7.map((d,i)=>{const pct=Math.min(d.steps/STEP_GOAL,1),isToday=d.date===today;return(
                    <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                      <div style={{fontSize:8,color:d.steps>=STEP_GOAL?"#4a8a4a":"#555"}}>{d.steps>0?(d.steps>=1000?`${(d.steps/1000).toFixed(1)}k`:d.steps):""}</div>
                      <div style={{width:"100%",height:Math.max(pct*60,d.steps>0?4:2),background:d.steps>=STEP_GOAL?"#4a8a4a":isToday?"#ff6a00":"#222",borderRadius:4,transition:"height 0.3s"}}/>
                      <div style={{fontSize:8,color:isToday?"#ff6a00":"#555"}}>{d.label}</div>
                    </div>
                  );})}
                </div>
                <div style={{borderTop:"1px solid #1a1a1a",marginTop:12,paddingTop:12,display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:12,color:"#8a7c6e"}}>7-day avg</span>
                  <span style={{fontSize:12,fontWeight:700,color:avgSteps>=STEP_GOAL?"#4a8a4a":"#ff6a00"}}>{avgSteps.toLocaleString()} steps</span>
                </div>
              </div>
              <div style={{background:"#0d1a0d",borderRadius:16,padding:18,border:"1px solid #1a3a1a"}}>
                <div style={{fontSize:9,letterSpacing:3,color:"#4a8a4a",textTransform:"uppercase",marginBottom:10}}>Step Targets by Phase</div>
                {[{weeks:"Weeks 1–4",target:"6,000/day",note:"Build the habit"},{weeks:"Weeks 5–8",target:"8,000/day",note:"Steady fat burn"},{weeks:"Weeks 9+",target:"10,000/day",note:"Accelerate"}].map((p,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <span style={{fontSize:11,color:"#8a7c6e"}}>{p.weeks}</span>
                    <span style={{fontSize:12,fontWeight:700,color:"#ff6a00"}}>{p.target}</span>
                    <span style={{fontSize:10,color:"#555"}}>{p.note}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ── CALENDAR TAB ── */}
          {activeTab==="calendar"&&(()=>{
            const now=new Date(),dispDate=new Date(now.getFullYear(),now.getMonth()-calOffset,1);
            const year=dispDate.getFullYear(),month=dispDate.getMonth();
            const monthName=dispDate.toLocaleString("default",{month:"long"});
            const firstDay=new Date(year,month,1).getDay(),daysInMonth=new Date(year,month+1,0).getDate();
            const todayStr=now.toISOString().split("T")[0];
            const dayColors={"A":"#ff6a00","B":"#5599cc","C":"#4a8a4a"};
            const dayLabels={"A":"Push","B":"Pull","C":"Legs"};
            const dayEmoji={"A":"💪","B":"🦾","C":"🦵"};
            const cells=[]; for(let i=0;i<firstDay;i++) cells.push(null); for(let d=1;d<=daysInMonth;d++) cells.push(d);
            const monthStr=`${year}-${String(month+1).padStart(2,"0")}`;
            const monthWorkouts=Object.entries(logs).filter(([k])=>k.startsWith(monthStr));
            const monthStepGoal=Object.entries(stepLogs).filter(([k,v])=>k.startsWith(monthStr)&&v>=STEP_GOAL).length;
            return (
              <div style={{padding:"18px 24px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                  <button onClick={()=>setCalOffset(calOffset+1)} style={{background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#f0ede8",borderRadius:10,width:36,height:36,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:17,fontWeight:700}}>{monthName} {year}</div>
                    <div style={{fontSize:10,color:"#8a7c6e",marginTop:2}}>{monthWorkouts.length} workout{monthWorkouts.length!==1?"s":""} · {monthStepGoal} step goal days</div>
                  </div>
                  <button onClick={()=>setCalOffset(Math.max(0,calOffset-1))} style={{background:calOffset===0?"#111":"#1a1a1a",border:"1px solid #2a2a2a",color:calOffset===0?"#333":"#f0ede8",borderRadius:10,width:36,height:36,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:3}}>
                  {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=><div key={d} style={{textAlign:"center",fontSize:9,color:"#555",padding:"4px 0",letterSpacing:1}}>{d}</div>)}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:20}}>
                  {cells.map((day,i)=>{
                    if(!day) return <div key={i}/>;
                    const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
                    const wo=logs[dateStr],steps=stepLogs[dateStr]||0,stepHit=steps>=STEP_GOAL,isToday=dateStr===todayStr;
                    const woColor=wo?dayColors[wo.day]:"transparent";
                    return(
                      <div key={i} style={{aspectRatio:"1",borderRadius:8,background:wo?woColor+"22":isToday?"#1a1a1a":"transparent",border:`1px solid ${wo?woColor:isToday?"#ff6a00":"#1e1e1e"}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative",padding:2}}>
                        <div style={{fontSize:11,fontWeight:isToday?700:400,color:wo?woColor:isToday?"#ff6a00":"#888"}}>{day}</div>
                        {wo&&<div style={{fontSize:9,color:woColor,lineHeight:1}}>{dayEmoji[wo.day]}</div>}
                        {stepHit&&<div style={{position:"absolute",bottom:2,right:2,width:5,height:5,borderRadius:"50%",background:"#4a8a4a"}}/>}
                      </div>
                    );
                  })}
                </div>
                <div style={{background:"#111",borderRadius:12,padding:"12px 14px",border:"1px solid #222",marginBottom:16}}>
                  <div style={{fontSize:9,letterSpacing:2,color:"#555",textTransform:"uppercase",marginBottom:8}}>Legend</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
                    {Object.entries(dayColors).map(([id,col])=>(
                      <div key={id} style={{display:"flex",alignItems:"center",gap:5}}>
                        <div style={{width:10,height:10,borderRadius:3,background:col}}/><span style={{fontSize:11,color:"#8a7c6e"}}>{dayEmoji[id]} {dayLabels[id]}</span>
                      </div>
                    ))}
                    <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:8,height:8,borderRadius:"50%",background:"#4a8a4a"}}/><span style={{fontSize:11,color:"#8a7c6e"}}>Step goal hit</span></div>
                  </div>
                </div>
                <div style={{fontSize:9,letterSpacing:3,color:"#8a7c6e",textTransform:"uppercase",marginBottom:10}}>Workouts this month</div>
                {monthWorkouts.length===0?(
                  <div style={{background:"#111",borderRadius:12,padding:16,border:"1px solid #222",textAlign:"center",color:"#555",fontSize:13}}>No workouts logged yet this month.</div>
                ):monthWorkouts.sort((a,b)=>b[0].localeCompare(a[0])).map(([date,wo])=>{
                  const d=new Date(date+"T12:00:00"),label=d.toLocaleDateString("default",{weekday:"short",month:"short",day:"numeric"});
                  const col=dayColors[wo.day],setEntries=wo.sets?Object.entries(wo.sets):[],loggedSets=setEntries.filter(([,v])=>v&&(v.weight||v.reps));
                  return(
                    <div key={date} style={{background:"#111",borderRadius:12,padding:"12px 14px",border:"1px solid #222",marginBottom:8,borderLeft:`3px solid ${col}`}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:loggedSets.length?6:0}}>
                        <div><span style={{fontSize:13,fontWeight:700,color:col}}>{dayEmoji[wo.day]} {dayLabels[wo.day]} Day</span><span style={{fontSize:11,color:"#555",marginLeft:8}}>Wk {wo.week+1}</span></div>
                        <span style={{fontSize:11,color:"#8a7c6e"}}>{label}</span>
                      </div>
                      {loggedSets.length>0&&(
                        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
                          {loggedSets.slice(0,6).map(([k,v])=>{
                            const exId=k.split("_")[0],allExes=PROGRAM.days.flatMap(d=>d.exercises),ex=allExes.find(e=>e.id===exId);
                            return ex?<span key={k} style={{fontSize:9,color:"#8a7c6e",background:"#1a1a1a",padding:"2px 7px",borderRadius:20}}>{ex.name.split(" ").slice(-1)[0]}{v.weight?` ${v.weight}lb`:""}</span>:null;
                          })}
                          {loggedSets.length>6&&<span style={{fontSize:9,color:"#555"}}>+{loggedSets.length-6} more</span>}
                        </div>
                      )}
                    </div>
                  );
                })}
                <div style={{fontSize:9,letterSpacing:3,color:"#8a7c6e",textTransform:"uppercase",marginBottom:10,marginTop:16}}>All-time</div>
                <div style={{display:"flex",gap:8,marginBottom:24}}>
                  {[{label:"Total",val:Object.keys(logs).length},{label:"Push",val:Object.values(logs).filter(v=>v.day==="A").length},{label:"Pull",val:Object.values(logs).filter(v=>v.day==="B").length},{label:"Legs",val:Object.values(logs).filter(v=>v.day==="C").length}].map((s,i)=>(
                    <div key={i} style={{flex:1,background:"#111",borderRadius:10,padding:"10px 0",textAlign:"center",border:"1px solid #222"}}>
                      <div style={{fontSize:18,fontWeight:700,color:"#ff6a00"}}>{s.val}</div>
                      <div style={{fontSize:9,color:"#555",marginTop:2,letterSpacing:1,textTransform:"uppercase"}}>{s.label}</div>
                    </div>
                  ))}
                </div>

                {/* ── BACKUP & RESTORE ── */}
                <div style={{marginTop:8,marginBottom:8}}>
                  <div onClick={()=>setShowBackup(!showBackup)}
                    style={{background:"#111",borderRadius:12,padding:"13px 16px",border:"1px solid #222",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:"#f0ede8"}}>💾 Backup & Restore</div>
                      <div style={{fontSize:10,color:"#8a7c6e",marginTop:2}}>Export your data · Import a previous backup</div>
                    </div>
                    <span style={{color:"#555",fontSize:13}}>{showBackup?"▲":"▼"}</span>
                  </div>
                  {showBackup&&(
                    <div style={{background:"#0f0f0f",borderRadius:"0 0 12px 12px",padding:16,border:"1px solid #222",borderTop:"none"}}>
                      <div style={{fontSize:11,color:"#8a7c6e",lineHeight:1.7,marginBottom:12}}>
                        Your data lives in this browser session. Export regularly so you never lose progress. To restore: paste a backup below and hit Restore.
                      </div>
                      <button onClick={exportData}
                        style={{width:"100%",padding:"14px 0",borderRadius:10,background:"#ff6a00",color:"#0a0a0a",fontWeight:700,fontSize:14,marginBottom:14}}>
                        ⬇️ Download Backup File
                      </button>
                      <div style={{fontSize:9,color:"#8a7c6e",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>Restore from backup</div>
                      <textarea
                        placeholder='Paste your backup JSON here...'
                        value={importText}
                        onChange={e=>setImportText(e.target.value)}
                        style={{width:"100%",height:90,background:"#1a1a1a",border:"1px solid #333",borderRadius:8,padding:"10px 12px",color:"#f0ede8",fontSize:12,fontFamily:"monospace",resize:"none",display:"block",boxSizing:"border-box"}}
                      />
                      {importStatus&&(
                        <div style={{fontSize:12,color:importStatus.startsWith("✅")?"#4a8a4a":"#cc4444",marginTop:8,textAlign:"center",fontWeight:700}}>
                          {importStatus}
                        </div>
                      )}
                      <button onClick={importData}
                        style={{width:"100%",padding:"12px 0",borderRadius:10,background:"#1a1a1a",color:"#f0ede8",fontWeight:600,fontSize:13,border:"1px solid #333",marginTop:10}}>
                        ⬆️ Restore from Backup
                      </button>
                      <div style={{fontSize:9,color:"#444",marginTop:10,lineHeight:1.7,textAlign:"center"}}>
                        Data stays private — never leaves your browser.<br/>Bookmark this chat to always find your tracker.
                      </div>
                    </div>
                  )}
                </div>
              </div>
            );
          })()}

          {/* ── SCIENCE TAB ── */}
          {activeTab==="science"&&(
            <div style={{padding:"20px 24px"}}>
              <div style={{background:"#111",borderRadius:14,padding:16,border:"1px solid #222",marginBottom:16}}>
                <div style={{fontSize:12,color:"#8a7c6e",lineHeight:1.7}}><strong style={{color:"#ff6a00"}}>Jeff Nippard</strong> — natural pro bodybuilder, evidence-based coach. <strong style={{color:"#5599cc"}}>Andrew Huberman</strong> — Stanford neuroscience professor.</div>
              </div>
              {TIPS.map((tip,i)=>{
                const open=expandedTip===i,tc=tip.who==="Huberman"?"#5599cc":tip.who==="Nippard"?"#ff6a00":"#9060c0";
                const bg=tip.who==="Huberman"?"#0a0f18":tip.who==="Nippard"?"#1a0900":"#120815";
                const bc=tip.who==="Huberman"?"#1a2a40":tip.who==="Nippard"?"#2a1100":"#221030";
                return(
                  <div key={i} onClick={()=>setExpandedTip(open?null:i)} style={{background:open?bg:"#111",borderRadius:14,padding:"15px 17px",marginBottom:10,border:`1px solid ${open?bc:"#222"}`,cursor:"pointer",transition:"all 0.2s"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div style={{display:"flex",alignItems:"center",gap:12}}>
                        <span style={{fontSize:22}}>{tip.icon}</span>
                        <div><div style={{fontWeight:700,fontSize:14}}>{tip.title}</div><div style={{fontSize:9,color:tc,marginTop:2,letterSpacing:2,textTransform:"uppercase"}}>{tip.who}</div></div>
                      </div>
                      <div style={{color:"#555",fontSize:14}}>{open?"∧":"›"}</div>
                    </div>
                    {open&&<div style={{marginTop:12,fontSize:13,color:"#c0b8af",lineHeight:1.8,borderTop:`1px solid ${bc}`,paddingTop:12}}>{tip.body}</div>}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ══ BOTTOM NAV ══════════════════════════════════════════ */}
      {screen==="home"&&(
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#0f0f0f",borderTop:"1px solid #1e1e1e",display:"flex",padding:"10px 0 20px"}}>
          {[["training","🏋️","Train"],["nutrition","🍽️","Eat"],["steps","🚶","Steps"],["calendar","📅","Log"],["science","🧪","Science"]].map(([id,icon,label])=>(
            <button key={id} onClick={()=>setActiveTab(id)} style={{flex:1,background:"none",color:activeTab===id?"#ff6a00":"#444",fontSize:11,letterSpacing:1,textTransform:"uppercase",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <span style={{fontSize:24}}>{icon}</span>{label}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html
